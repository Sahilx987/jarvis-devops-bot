name: Deploy Jarvis Bot

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd /home/ubuntu/jarvis-devops-bot

            git pull origin master

            docker stop jarvis || true
            docker rm jarvis || true

            docker build -t jarvis-bot .

            docker run -d \
              --name jarvis \
              --restart always \
              --env-file .env \
              jarvis-bot